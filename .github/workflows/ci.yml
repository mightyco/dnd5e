name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.3.9'
        bundler-cache: true
    - name: Build rules cache
      run: bundle exec rake rules:build
    - name: Run all tests, linting, and examples
      run: bundle exec rake all
    - name: Run balance regression tests
      run: bundle exec rake test:balance
